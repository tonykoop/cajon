<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <style>
    .panel{fill:#d2a66b;stroke:#111;stroke-width:4}
    .keep{fill:none;stroke:#b44;stroke-width:3;stroke-dasharray:10 8}
    .inlay{fill:#e8c574;stroke:#654321;stroke-width:3}
    .dim{stroke:#111;stroke-width:2;marker-start:url(#arrow);marker-end:url(#arrow)}
    .small{font:16px Arial,sans-serif;fill:#111}
    .title{font:20px Arial,sans-serif;font-weight:bold;fill:#111}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#111"/></marker></defs>
  <rect x="20" y="20" width="860" height="660" fill="#fff"/>
  <text x="50" y="58" class="title">Sheet 08/08 - CNC Inlay Zone, Standard Side Panel</text>
  <text x="50" y="84" class="small">Route inlay before assembly. Keep pockets away from joint and screw-bearing edges.</text>
  <rect x="150" y="150" width="560" height="360" class="panel"/>
  <rect x="210" y="210" width="440" height="240" class="keep"/>
  <circle cx="430" cy="330" r="72" class="inlay"/>
  <path d="M430 230 C500 260 500 400 430 430 C360 400 360 260 430 230 Z" fill="#f6e6a8" stroke="#654321" stroke-width="3"/>
  <line x1="150" y1="545" x2="710" y2="545" class="dim"/>
  <text x="390" y="584" class="small">12.000 in side depth</text>
  <line x1="750" y1="150" x2="750" y2="510" class="dim"/>
  <text x="772" y="334" class="small">18.000 in height</text>
  <line x1="150" y1="120" x2="210" y2="120" class="dim"/>
  <text x="143" y="110" class="small">1 in keep-out</text>
  <text x="50" y="624" class="small">Pocket depth: 0.080-0.100 in. Acceptance: no inlay within 1 in of a joinery edge; no post-sand step over 0.002 in.</text>
  <rect x="570" y="600" width="270" height="56" fill="none" stroke="#111"/>
  <text x="584" y="624" class="small">Heifer Zephyr Instruments</text>
  <text x="584" y="646" class="small">Cajon Family - Sheet 08</text>
</svg>
