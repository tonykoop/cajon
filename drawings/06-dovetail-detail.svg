<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620">
  <style>
    .wood{fill:#d2a66b;stroke:#111;stroke-width:3}
    .end{fill:#bc8651;stroke:#111;stroke-width:3}
    .cut{fill:#f8ead0;stroke:#111;stroke-width:2}
    .dim{stroke:#111;stroke-width:2;marker-start:url(#arrow);marker-end:url(#arrow)}
    .small{font:16px Arial,sans-serif;fill:#111}
    .title{font:20px Arial,sans-serif;font-weight:bold;fill:#111}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#111"/></marker></defs>
  <rect x="20" y="20" width="860" height="580" fill="#fff"/>
  <text x="50" y="58" class="title">Sheet 06/08 - V2 Half-Blind Dovetail Corner Section</text>
  <text x="50" y="84" class="small">CNC showpiece variant. 14 degree dovetail bit, 3/4 in walnut side/top panels.</text>
  <rect x="180" y="180" width="430" height="120" class="wood"/>
  <rect x="180" y="300" width="120" height="210" class="end"/>
  <polygon class="cut" points="222,180 262,180 250,300 234,300"/>
  <polygon class="cut" points="312,180 352,180 340,300 324,300"/>
  <polygon class="cut" points="402,180 442,180 430,300 414,300"/>
  <polygon class="cut" points="492,180 532,180 520,300 504,300"/>
  <line x1="180" y1="140" x2="300" y2="140" class="dim"/>
  <text x="207" y="126" class="small">0.750</text>
  <line x1="650" y1="180" x2="650" y2="300" class="dim"/>
  <text x="668" y="248" class="small">socket depth</text>
  <text x="50" y="550" class="small">Acceptance: visible gaps <=0.005 in after dry fit. Use a sacrificial test corner before cutting finished walnut.</text>
  <rect x="590" y="500" width="260" height="56" fill="none" stroke="#111"/>
  <text x="604" y="524" class="small">Heifer Zephyr Instruments</text>
  <text x="604" y="546" class="small">Cajon Family - Sheet 06</text>
</svg>
