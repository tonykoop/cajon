<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" font-family="Inter, sans-serif">
  <defs>
    <pattern id="ply2" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#caa56a" stroke-width="0.4" opacity="0.5"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="1000" height="800" fill="#fcf9f1"/>
  <text x="500" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2417">BACK PANEL — STANDARD (CJ-S)</text>
  <text x="500" y="64" text-anchor="middle" font-size="12" fill="#6b4f2c" font-style="italic">Sound-hole position, snare-mount block keep-out, screw-perimeter — outside view</text>

  <!-- Back panel — Standard 18 H x 12 W; scale 1 in = 32 px = 384 wide, 576 tall -->
  <g transform="translate(280, 110)">
    <rect x="0" y="0" width="384" height="576" fill="url(#ply2)" stroke="#6b4f2c" stroke-width="2"/>

    <!-- Sound hole 4.5" dia, centred L-R, 1/3 from top.
         centre = (192, 192). radius = 72px (4.5/2 in * 32 px/in) -->
    <circle cx="192" cy="192" r="72" fill="#fcf9f1" stroke="#2b2417" stroke-width="2"/>
    <text x="192" y="195" text-anchor="middle" font-size="14" fill="#2b2417" font-weight="bold">4.50″ Ø</text>
    <text x="192" y="212" text-anchor="middle" font-size="10" fill="#6b4f2c" font-style="italic">centred · 1/3 H from top</text>

    <!-- Centerline -->
    <line x1="192" y1="-10" x2="192" y2="586" stroke="#6b4f2c" stroke-width="0.6" stroke-dasharray="4,3"/>

    <!-- Snare mount block keep-out zone (option B) -->
    <rect x="124" y="32" width="136" height="32" fill="none" stroke="#b95a3b" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="192" y="22" text-anchor="middle" font-size="10" fill="#b95a3b" font-style="italic">snare mount block — interior face</text>

    <!-- Tuner-peg holes (4) -->
    <g fill="#b8902f">
      <circle cx="156" cy="500" r="5"/><circle cx="180" cy="500" r="5"/>
      <circle cx="204" cy="500" r="5"/><circle cx="228" cy="500" r="5"/>
    </g>
    <text x="192" y="528" text-anchor="middle" font-size="10" fill="#5b3a1c">4× tuner-peg holes — drill Ø 5/16″</text>

    <!-- Dimensions -->
    <line x1="-30" y1="0"   x2="-30" y2="576" stroke="#2b2417" stroke-width="0.6"/>
    <line x1="-34" y1="0"   x2="-26" y2="0"   stroke="#2b2417" stroke-width="0.6"/>
    <line x1="-34" y1="576" x2="-26" y2="576" stroke="#2b2417" stroke-width="0.6"/>
    <text x="-44" y="290" text-anchor="end" font-size="11" fill="#2b2417">18.000″</text>

    <line x1="0"   y1="-20" x2="384" y2="-20" stroke="#2b2417" stroke-width="0.6"/>
    <line x1="0"   y1="-24" x2="0"   y2="-16" stroke="#2b2417" stroke-width="0.6"/>
    <line x1="384" y1="-24" x2="384" y2="-16" stroke="#2b2417" stroke-width="0.6"/>
    <text x="192" y="-26" text-anchor="middle" font-size="11" fill="#2b2417">12.000″</text>

    <!-- 1/3 H from top dim -->
    <line x1="430" y1="0"   x2="430" y2="192" stroke="#2b2417" stroke-width="0.6"/>
    <line x1="426" y1="0"   x2="434" y2="0"   stroke="#2b2417" stroke-width="0.6"/>
    <line x1="426" y1="192" x2="434" y2="192" stroke="#2b2417" stroke-width="0.6"/>
    <text x="438" y="100" font-size="11" fill="#2b2417">6.000″</text>
    <text x="438" y="116" font-size="9" fill="#6b4f2c" font-style="italic">(1/3 of 18″)</text>

    <line x1="430" y1="192" x2="430" y2="500" stroke="#2b2417" stroke-width="0.4" stroke-dasharray="2,2"/>
    <line x1="426" y1="500" x2="434" y2="500" stroke="#2b2417" stroke-width="0.6"/>
    <text x="438" y="350" font-size="10" fill="#5b3a1c">to tuner row</text>
    <text x="438" y="365" font-size="10" fill="#5b3a1c">9.625″</text>
  </g>

  <!-- Notes -->
  <g transform="translate(40, 110)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#2b2417">Notes</text>
    <text x="0" y="22" font-size="11" fill="#5b3a1c">1. Material: 1/2″ Baltic birch BB grade.</text>
    <text x="0" y="40" font-size="11" fill="#5b3a1c">2. Sound hole: cleanest result is CNC pocket;</text>
    <text x="0" y="56" font-size="11" fill="#5b3a1c">    hole-saw + jigsaw + rasp acceptable.</text>
    <text x="0" y="74" font-size="11" fill="#5b3a1c">3. Deburr both sides 220 grit. Sharp edges</text>
    <text x="0" y="90" font-size="11" fill="#5b3a1c">    create high-frequency hash on slap.</text>
    <text x="0" y="116" font-size="11" fill="#5b3a1c">4. Snare mount block (interior side):</text>
    <text x="0" y="132" font-size="11" fill="#5b3a1c">    5″ × 1″ × 1″ maple, angled face 8–12°.</text>
    <text x="0" y="148" font-size="11" fill="#5b3a1c">    Glue + #6 screws from outside.</text>
    <text x="0" y="172" font-size="11" fill="#5b3a1c">5. Tuner pegs (option B snare):</text>
    <text x="0" y="188" font-size="11" fill="#5b3a1c">    4 holes, Ø 5/16″, 24 mm spacing.</text>
    <text x="0" y="206" font-size="11" fill="#5b3a1c">    Use 3 of 4 by default; spare hole for 4th.</text>
  </g>

  <!-- Title block -->
  <g transform="translate(640, 690)">
    <rect x="0" y="0" width="320" height="80" fill="none" stroke="#2b2417" stroke-width="1"/>
    <line x1="0" y1="28" x2="320" y2="28" stroke="#2b2417" stroke-width="0.6"/>
    <line x1="160" y1="28" x2="160" y2="80" stroke="#2b2417" stroke-width="0.6"/>
    <text x="10" y="20" font-size="13" font-weight="bold" fill="#2b2417">Back Panel — Standard</text>
    <text x="10" y="46" font-size="10" fill="#5b3a1c">Heifer Zephyr · Cajón Family</text>
    <text x="10" y="68" font-size="10" fill="#5b3a1c">Sheet 3 of 8 · Rev v1 · 1:8 scale</text>
    <text x="170" y="46" font-size="10" fill="#5b3a1c">Tony Koop</text>
    <text x="170" y="68" font-size="10" fill="#5b3a1c">2026-05-07</text>
  </g>
</svg>
