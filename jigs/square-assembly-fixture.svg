<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760">
  <style>
    .base{fill:#f5f5f5;stroke:#111;stroke-width:3}
    .fence{fill:#c9d7e8;stroke:#111;stroke-width:3}
    .block{fill:#e7c88e;stroke:#111;stroke-width:3}
    .box{fill:none;stroke:#7b4d22;stroke-width:5}
    .txt{font:17px Arial,sans-serif;fill:#111}
  </style>
  <rect width="900" height="760" fill="#fff"/>
  <text x="42" y="42" class="txt">CJ-S square assembly fixture - flat baseboard with fixed fences and movable clamp blocks</text>
  <rect x="100" y="100" width="660" height="520" class="base"/>
  <rect x="100" y="100" width="40" height="520" class="fence"/>
  <rect x="100" y="100" width="660" height="40" class="fence"/>
  <rect x="240" y="210" width="360" height="360" class="box"/>
  <rect x="210" y="180" width="70" height="45" class="block"/>
  <rect x="560" y="180" width="70" height="45" class="block"/>
  <rect x="210" y="555" width="70" height="45" class="block"/>
  <rect x="560" y="555" width="70" height="45" class="block"/>
  <line x1="240" y1="210" x2="600" y2="570" stroke="#b44" stroke-width="2" stroke-dasharray="9 7"/>
  <line x1="600" y1="210" x2="240" y2="570" stroke="#b44" stroke-width="2" stroke-dasharray="9 7"/>
  <text x="288" y="396" class="txt">dry-fit shell here</text>
  <text x="150" y="665" class="txt">Check both diagonals before glue and after clamp-up. Target: within 1/16 in.</text>
</svg>
